# Catppuccin Mocha
$base = rgb(1e1e2e)
$mantle = rgb(181825)
$crust = rgb(11111b)
$text = rgb(cdd6f4)
$subtext0 = rgb(a6adc8)
$subtext1 = rgb(bac2de)
$surface0 = rgb(313244)
$surface1 = rgb(45475a)
$surface2 = rgb(585b70)
$overlay0 = rgb(6c7086)
$overlay1 = rgb(7f849c)
$overlay2 = rgb(9399b2)
$blue = rgb(89b4fa)
$lavender = rgb(b4befe)
$sapphire = rgb(74c7ec)
$sky = rgb(89dceb)
$teal = rgb(94e2d5)
$green = rgb(a6e3a1)
$yellow = rgb(f9e2af)
$peach = rgb(fab387)
$maroon = rgb(eba0ac)
$red = rgb(f38ba8)
$mauve = rgb(cba6f7)
$pink = rgb(f5c2e7)
$flamingo = rgb(f2cdcd)
$rosewater = rgb(f5e0dc)

exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie & hyprpaper & hypridle & waybar & wl-paste --type text --watch cliphist store
exec-once = wl-paste --watch wl-copy --primary
exec-once = dunst
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec = lid.sh

# SDDM's wayland-session re-execs as `bash --login` and gives Hyprland a PATH
# missing ~/.nix-profile/bin and ~/.local/bin (see feedback memory). Without
# this, keybinds `exec, powermenu` etc. all fail with `command not found`.
# Hyprland's env directive is literal — no $VAR expansion — so paths hardcoded.
# Path list includes NixOS-specific dirs (harmless on Fedora).
env = PATH,/home/nicolas/.nix-profile/bin:/home/nicolas/.local/bin:/run/current-system/sw/bin:/etc/profiles/per-user/nicolas/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = SHELL,bash

monitor = , preferred, auto, auto

input {
    kb_layout = us,fr
    kb_variant = dvorak-alt-intl,
    kb_options = grp:alt_shift_toggle,compose:menu,caps:ctrl_modifier
    follow_mouse = 0
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 6
    gaps_out = 10
    border_size = 3
    col.active_border = $lavender
    col.inactive_border = $mantle
    layout = dwindle
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1
    rounding = 6
    blur {
        enabled = true
        size = 4
        passes = 4
        vibrancy = 0.1696
        ignore_opacity = false
    }
}

group {
    col.border_active = $lavender
    col.border_inactive = $mantle
    groupbar {
        text_color_inactive = $text
        col.active = $lavender
        col.inactive = $surface2
        font_size = 16
        height = 20
    }
}

animations {
    enabled = true
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    animation = windowsIn, 1, 6, md3_decel, slide
    animation = windowsOut, 1, 6, md3_decel, slide
    animation = windowsMove, 1, 6, md3_decel, slide
    animation = fade, 1, 10, md3_decel
    animation = workspaces, 1, 7, md3_decel, slide
    animation = specialWorkspace, 1, 8, md3_decel, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    vfr = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    font_family = Open Sans
}

binds {
    allow_workspace_cycles = true
}

$mainMod = SUPER
$left = h
$right = l
$up = t
$down = n

bind = $mainMod SHIFT CTRL, W, exec, start_work.sh
bind = $mainMod, Q, killactive,
bind = $mainMod, RETURN, exec, $TERMINAL
bind = $mainMod, SPACE, exec, rofi -show drun -show-icons
bind = $mainMod CONTROL, SPACE, exec, rofi -show run
bind = $mainMod, E, exec, $TERMINAL lfo
bind = $mainMod, w, togglegroup
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, E, exec, tofi-emoji
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, V, exec, tofi-clip
bind = $mainMod, B, exec, pass-menu bw
bind = $mainMod SHIFT, B, exec, pass-menu pb
bind = $mainMod, T, exec, pomodoro-menu.sh
bind = $mainMod, X, exec, powermenu
bind = $mainMod CONTROL, ESCAPE, exec, pkill waybar; waybar & disown

# Warpd (keyboard-driven mouse)
bind = $mainMod, g, exec, ~/Perso/warpd/bin/warpd --grid
bind = $mainMod, c, exec, ~/Perso/warpd/bin/warpd --hint2
bind = $mainMod, r, exec, ~/Perso/warpd/bin/warpd --normal

# Media
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86Messenger, exec, playerctl previous
bind = , XF86Go, exec, playerctl play-pause
bind = , Cancel, exec, playerctl next
bind = , XF86AudioMute, exec, volume mute

# Screenshots
bind = $mainMod SHIFT CTRL, p, exec, grimblast --notify copysave screen
bind = $mainMod SHIFT, p, exec, grimblast --notify copysave area
bind = $mainMod, p, exec, dunstctl set-paused toggle

# Focus
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $right, movefocus, r
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $down, movefocus, d
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod+SHIFT, TAB, changegroupactive, b

# Move windows
bind = $mainMod SHIFT, $left, movewindoworgroup, l
bind = $mainMod SHIFT, $right, movewindoworgroup, r
bind = $mainMod SHIFT, $up, movewindoworgroup, u
bind = $mainMod SHIFT, $down, movewindoworgroup, d

# Center
bind = $mainMod, c, centerwindow

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = CTRL $mainMod, h, movecurrentworkspacetomonitor, l
bind = CTRL $mainMod, l, movecurrentworkspacetomonitor, r

# Special workspace
bind = $mainMod, ESCAPE, togglespecialworkspace, magic
bind = $mainMod SHIFT, ESCAPE, movetoworkspace, special:magic

# Mouse scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

binde = , XF86MonBrightnessUp, exec, backlight up
binde = , XF86MonBrightnessDown, exec, backlight down
binde = , XF86AudioRaiseVolume, exec, volume up
binde = , XF86AudioLowerVolume, exec, volume down
binde = $mainMod CONTROL, $left, resizeactive, -40 0
binde = $mainMod CONTROL, $right, resizeactive, 40 0
binde = $mainMod CONTROL, $up, resizeactive, 0 -40
binde = $mainMod CONTROL, $down, resizeactive, 0 40

bindm = $mainMod, mouse:272, movewindoworgroup
bindm = $mainMod, mouse:273, resizewindow

bindl = , switch:off:Lid Switch, exec, lid.sh open
bindl = , switch:on:Lid Switch, exec, lid.sh close

bindirt = , Caps_Lock, exec, pkill -SIGRTMIN+1 waybar

